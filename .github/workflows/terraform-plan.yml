# 目的：Pull Request を作る/更新するだけで Terraform の fmt/validate/plan を回し、
#      plan結果を PR コメントとして可視化する。

name: Terraform Plan (PR)

on:
  pull_request:
    # PRで毎回走ると重いので、Terraform対象ディレクトリ配下に変更がある時だけ走らせる
    paths:
      - "aws-terraform/step9-1/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  # OIDC で AWS の IAM Role を AssumeRole するために必須
  id-token: write
  # actions/checkout が repo を読むために必要
  contents: read
  # PRにコメントを書くために必要
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        # Terraform を実行するディレクトリを固定（迷い/事故防止）
        # ※ここを固定することで plan.txt などの出力先もこのディレクトリになる
        working-directory: aws-terraform/step9-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # ローカルとズレると plan 差分が変わるのでバージョン固定
          terraform_version: 1.6.6

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # GitHub Actions の Variables で管理している Role ARN を参照する
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        # -check は「フォーマット差分があれば失敗にする」モード（CI向け）
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        # 重要：以前の "terraform plan | tee plan.txt" だと
        # - plan が失敗した時に plan.txt が作られず、後続の PR コメントが ENOENT で落ちる
        # 対策：成功した時だけ確実に plan.txt を作れるように
        #   1) plan結果をバイナリ(tfplan)に保存
        #   2) show でテキスト化して plan.txt を作成
        run: |
          terraform plan -no-color -input=false -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment plan on PR
        # 重要：plan が失敗した時は、このステップ自体をスキップ（ENOENT回避）
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            // working-directory を固定しているので plan.txt はカレントにある想定
            const plan = fs.readFileSync("plan.txt", "utf8");

            // GitHubのコメントは長すぎると失敗するので上限を設定
            const max = 60000;
            const bodyPlan =
              plan.length > max ? plan.slice(0, max) + "\n\n...(truncated)" : plan;

            // Markdownコメント本文（折りたたみ + コードブロック）
            const body = [
              "## Terraform Plan (aws-terraform/step9-1)",
              "",
              "<details>",
              "<summary>Show plan</summary>",
              "",
              "```",
              bodyPlan,
              "```",
              "",
              "</details>",
              "",
              "- Backend: S3 + DynamoDB",
              "- Trigger: pull_request",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });